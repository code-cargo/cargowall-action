name: 'CargoWall eBPF Firewall'
description: 'Secure GitHub Actions runners with eBPF-based network egress filtering'
author: 'CodeCargo'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  mode:
    description: 'Enforcement mode: "enforce" (block connections) or "audit" (log only, no blocking)'
    required: false
    default: 'enforce'
  allowed-hosts:
    description: 'Allowed hostnames, one per line (auto matches subdomains example.com would also match api.example.com)'
    required: false
  allowed-cidrs:
    description: 'Allowed CIDR blocks, one per line'
    required: false
  github-service-hosts:
    description: 'GitHub service hostnames to auto-allow on port 443 (one per line)'
    required: false
    default: |
      github.com
      api.github.com
      githubapp.com
      actions.githubusercontent.com
      github.githubassets.com
  azure-infra-hosts:
    description: 'Azure infrastructure hostnames to auto-allow on port 443 (one per line)'
    required: false
    default: |
      trafficmanager.net
      blob.core.windows.net
  config-file:
    description: 'Path to YAML/JSON config file for advanced rules'
    required: false
  version:
    description: 'CargoWall version to use (e.g., v1.0.0 or latest)'
    default: 'latest'
  include-prerelease:
    description: 'Include pre-release versions when resolving "latest"'
    default: 'false'
  fail-on-unsupported:
    description: 'Fail the workflow if eBPF is not supported (vs warn and continue)'
    default: 'false'
  sudo-lockdown:
    description: 'Enable sudo lockdown to prevent firewall bypass'
    default: 'false'
  sudo-allow-commands:
    description: 'Command paths to allow via sudo when lockdown is enabled, one per line (e.g. /usr/bin/apt-get)'
    default: ''
  dns-upstream:
    description: 'Upstream DNS server for forwarding queries (auto-detected from /etc/resolv.conf if not set)'
    default: ''
  allow-existing-connections:
    description: 'Allow pre-existing TCP connections at startup (prevents blocking connections established before cargowall)'
    default: 'true'
  binary-path:
    description: 'Path to a pre-built cargowall binary (skips download, useful for CI testing)'
    required: false
  debug:
    description: 'Enable debug logging'
    default: 'false'
  audit-summary:
    description: 'Generate audit summary in workflow summary (requires mode: audit or enforce)'
    default: 'true'
  github-token:
    description: 'GitHub token for downloading the binary and fetching step timing in audit summary'
    default: ${{ github.token }}
  api-url:
    description: 'CodeCargo API URL to push audit results to (e.g. https://app.codecargo.com). Requires permissions: id-token: write'
    required: false
  api-audience:
    description: 'OIDC audience for CodeCargo API authentication'
    default: 'codecargo'

outputs:
  supported:
    description: 'Whether eBPF firewall was successfully activated'
  pid:
    description: 'Process ID of the running cargowall instance'

runs:
  using: 'node24'
  main: 'dist/main/index.js'
  post: 'dist/post/index.js'
  post-if: 'always()'
