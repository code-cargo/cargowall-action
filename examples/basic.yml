name: Basic CargoWall Example

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enable network egress filtering
      - uses: code-cargo/cargowall-action@v1
        with:
          default-action: deny
          allowed-hosts: |
            github.com,
            *.githubusercontent.com,
            api.github.com,
            registry.npmjs.org,
            *.cloudflare.com

      # Your build steps - only allowed hosts can be reached
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test allowed connection
        run: curl -sf https://github.com > /dev/null && echo "GitHub is reachable"

      - name: Test blocked connection (expected to fail)
        run: |
          if curl -sf --max-time 5 https://example.com > /dev/null 2>&1; then
            echo "ERROR: example.com should be blocked!"
            exit 1
          fi
          echo "Correctly blocked example.com"
