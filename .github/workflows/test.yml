name: Test CargoWall Action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:



jobs:
  test-basic-actions-read:
    name: Basic Functionality (Actions Read)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall
        id: cargowall
        uses: ./
        with:
          offline: 'true'
          allowed-hosts: |
            github.com
            githubusercontent.com
            api.github.com

      - name: Verify pid output is the real cargowall process (not the sudo wrapper)
        run: |
          PID='${{ steps.cargowall.outputs.pid }}'
          test -n "$PID"
          # /proc/<pid>/comm is world-readable, so ps works without sudo.
          COMM=$(ps -o comm= -p "$PID" | tr -d '[:space:]')
          echo "pid=$PID comm=$COMM"
          if [ "$COMM" != "cargowall" ]; then
            echo "ERROR: pid output should be the cargowall process, got '$COMM'"
            exit 1
          fi

      - name: Test allowed connection (github.com)
        run: |
          curl -sf --max-time 10 https://github.com > /dev/null
          echo "Successfully connected to github.com"

      - name: Test allowed connection (api.github.com)
        run: |
          curl -sf --max-time 10 https://api.github.com > /dev/null
          echo "Successfully connected to api.github.com"

      - name: Test blocked connection (example.com)
        run: |
          if curl -sf --max-time 5 https://example.com > /dev/null 2>&1; then
            echo "ERROR: example.com should be blocked"
            exit 1
          fi
          echo "Correctly blocked example.com"

      - name: Test blocked connection (httpbin.org)
        run: |
          if curl -sf --max-time 5 https://httpbin.org > /dev/null 2>&1; then
            echo "ERROR: httpbin.org should be blocked"
            exit 1
          fi
          echo "Correctly blocked httpbin.org"

  test-basic-no-actions-read:
    name: Basic Functionality (No Actions Read)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall
        uses: ./
        with:
          offline: 'true'
          skip-actions-api: 'true'
          allowed-hosts: |
            github.com
            githubusercontent.com
            api.github.com

      - name: Test allowed connection (github.com)
        run: |
          curl -sf --max-time 10 https://github.com > /dev/null
          echo "Successfully connected to github.com"

      - name: Test allowed connection (api.github.com)
        run: |
          curl -sf --max-time 10 https://api.github.com > /dev/null
          echo "Successfully connected to api.github.com"

      - name: Test blocked connection (example.com)
        run: |
          if curl -sf --max-time 5 https://example.com > /dev/null 2>&1; then
            echo "ERROR: example.com should be blocked"
            exit 1
          fi
          echo "Correctly blocked example.com"

      - name: Test blocked connection (httpbin.org)
        run: |
          if curl -sf --max-time 5 https://httpbin.org > /dev/null 2>&1; then
            echo "ERROR: httpbin.org should be blocked"
            exit 1
          fi
          echo "Correctly blocked httpbin.org"

  test-dns-filtering:
    name: DNS Tunneling Prevention
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall with strict hosts
        uses: ./
        with:
          allowed-hosts: |
            app.codecargo.com
            github.com
            api.github.com



      - name: Test allowed DNS query
        run: |
          nslookup github.com 127.0.0.1 || true
          echo "DNS query for github.com completed"

      - name: Test blocked DNS query (should be refused)
        run: |
          # DNS queries for non-allowed domains should be refused
          # This prevents DNS tunneling attacks
          if nslookup attacker-domain-12345.com 127.0.0.1 2>/dev/null; then
            # nslookup might return 0 even on REFUSED, check output
            OUTPUT=$(nslookup attacker-domain-12345.com 127.0.0.1 2>&1 || true)
            if echo "$OUTPUT" | grep -qi "refused\|SERVFAIL\|error\|timed out"; then
              echo "DNS query correctly refused/failed"
            else
              echo "WARNING: DNS query may have succeeded unexpectedly"
            fi
          else
            echo "DNS query correctly refused"
          fi

  test-cidr-rules:
    name: CIDR-Based Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall with CIDR rules
        uses: ./
        with:
          allowed-cidrs: |
            "140.82.112.0/20"  # GitHub's IP range
          allowed-hosts: |
            app.codecargo.com

      - name: Test connection to allowed CIDR
        run: |
          # github.com IPs are in the allowed CIDR
          curl -sf --max-time 10 https://github.com > /dev/null
          echo "Successfully connected via allowed CIDR"

  test-graceful-degradation:
    name: Graceful Degradation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall (should not fail even if issues)
        id: cargowall
        uses: ./
        with:
          allowed-hosts: |
            app.codecargo.com
            github.com
          fail-on-unsupported: false

      - name: Check if supported
        run: |
          echo "CargoWall supported: ${{ steps.cargowall.outputs.supported }}"

  test-docker-integration:
    name: Docker DNS Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall
        uses: ./
        with:
          allowed-hosts: |
            github.com
            app.codecargo.com
            docker.io
            docker.com
            registry-1.docker.io
            auth.docker.io
            production.cloudflare.docker.com

      - name: Test Docker pull (should work)
        run: |
          docker pull alpine:latest
          echo "Docker pull succeeded"

      - name: Test Docker run with DNS filtering
        run: |
          # Run a container that tries to reach a blocked host
          docker run --rm alpine:latest sh -c "
            if wget -q --timeout=5 -O /dev/null https://example.com 2>/dev/null; then
              echo 'ERROR: example.com should be blocked inside container'
              exit 1
            fi
            echo 'Correctly blocked example.com inside container'
          " || echo "Container test completed"

  test-single-label-wildcard:
    name: Single-Label Wildcard (*)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup CargoWall with single-label wildcard
        uses: ./
        with:
          offline: 'true'
          allowed-hosts: |
            *.ubuntu.com

      - name: Test allowed connection (archive.ubuntu.com matches *.ubuntu.com)
        run: |
          curl -sf --max-time 10 https://archive.ubuntu.com > /dev/null
          echo "Successfully connected to archive.ubuntu.com via *.ubuntu.com wildcard"

      - name: Test allowed connection (security.ubuntu.com matches *.ubuntu.com)
        run: |
          curl -sf --max-time 10 https://security.ubuntu.com > /dev/null
          echo "Successfully connected to security.ubuntu.com via *.ubuntu.com wildcard"

      - name: Test bare domain not matched (ubuntu.com should not match *.ubuntu.com)
        run: |
          if curl -sf --max-time 5 https://ubuntu.com > /dev/null 2>&1; then
            echo "ERROR: ubuntu.com should not match *.ubuntu.com (requires exactly one label)"
            exit 1
          fi
          echo "Correctly blocked ubuntu.com (not matched by *.ubuntu.com)"

      - name: Test blocked connection (httpbin.org)
        run: |
          if curl -sf --max-time 5 https://httpbin.org > /dev/null 2>&1; then
            echo "ERROR: httpbin.org should be blocked"
            exit 1
          fi
          echo "Correctly blocked httpbin.org"

  test-globstar-wildcard:
    name: Globstar Wildcard (**)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup CargoWall with globstar wildcard
        uses: ./
        with:
          offline: 'true'
          allowed-hosts: |
            **.ubuntu.com

      - name: Test allowed connection 2 labels deep (gb.archive.ubuntu.com matches **.ubuntu.com)
        run: |
          # us.archive.ubuntu.com was retired by Canonical and no longer resolves;
          # gb.archive.ubuntu.com is a live 2-label host under ubuntu.com. The -4 +
          # --connect-timeout flags skip IPv6 happy-eyeballs and fail a blackholed
          # mirror IP over to the next resolved address instead of burning --max-time.
          curl -sfL -4 --connect-timeout 5 --max-time 20 https://gb.archive.ubuntu.com > /dev/null
          echo "Successfully connected to gb.archive.ubuntu.com via **.ubuntu.com wildcard (2 labels deep)"

      - name: Test allowed connection 1 label deep (archive.ubuntu.com matches **.ubuntu.com)
        run: |
          curl -sf -4 --connect-timeout 5 --max-time 20 https://archive.ubuntu.com > /dev/null
          echo "Successfully connected to archive.ubuntu.com via **.ubuntu.com wildcard (1 label deep)"

      - name: Test bare domain not matched (ubuntu.com should not match **.ubuntu.com)
        run: |
          if curl -sf --max-time 5 https://ubuntu.com > /dev/null 2>&1; then
            echo "ERROR: ubuntu.com should not match **.ubuntu.com (requires one or more labels)"
            exit 1
          fi
          echo "Correctly blocked ubuntu.com (not matched by **.ubuntu.com)"

      - name: Test blocked connection (httpbin.org)
        run: |
          if curl -sf --max-time 5 https://httpbin.org > /dev/null 2>&1; then
            echo "ERROR: httpbin.org should be blocked"
            exit 1
          fi
          echo "Correctly blocked httpbin.org"

  test-mixed-wildcards:
    name: Mixed Wildcard Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup CargoWall with mixed wildcards
        uses: ./
        with:
          offline: 'true'
          allowed-hosts: |
            *.ubuntu.com

      # Assert the block BEFORE the allow: running it first means no *.ubuntu.com
      # IP is allowlisted yet, so a shared Canonical mirror IP can't mask the
      # block (gb.archive.ubuntu.com resolves into archive.ubuntu.com's IP pool).
      # The old host here, us.archive.ubuntu.com, was retired by Canonical and
      # made this pass vacuously — curl failed to resolve it, which looks
      # identical to a cargowall block.
      - name: Test 2-labels-deep name blocked (gb.archive.ubuntu.com not matched by *.ubuntu.com)
        run: |
          if curl -sfL -4 --max-time 5 https://gb.archive.ubuntu.com > /dev/null 2>&1; then
            echo "ERROR: gb.archive.ubuntu.com should be blocked (*.ubuntu.com only matches 1 label)"
            exit 1
          fi
          echo "Correctly blocked gb.archive.ubuntu.com (*.ubuntu.com does not match 2 labels deep)"

      - name: Test single-label wildcard (archive.ubuntu.com via *.ubuntu.com)
        run: |
          curl -sf -4 --connect-timeout 5 --max-time 20 https://archive.ubuntu.com > /dev/null
          echo "Successfully connected to archive.ubuntu.com via *.ubuntu.com"

      - name: Test blocked connection (httpbin.org)
        run: |
          if curl -sf --max-time 5 https://httpbin.org > /dev/null 2>&1; then
            echo "ERROR: httpbin.org should be blocked"
            exit 1
          fi
          echo "Correctly blocked httpbin.org"

  test-search-domains:
    name: DNS Search Domains
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall with search domains
        uses: ./
        with:
          offline: 'true'
          # `archive` is a bare single-label rule that only matches a real host
          # once the `.ubuntu.com` search-domain suffix is stripped before matching.
          allowed-hosts: |
            archive
          search-domains: |
            .ubuntu.com

      - name: Test suffix stripping enables rule match (archive.ubuntu.com -> archive)
        run: |
          # Without search-domains, the bare `archive` rule would NOT cover
          # archive.ubuntu.com. It connects only because `.ubuntu.com` is stripped
          # to `archive`, which matches the rule. The -4 + --connect-timeout flags
          # skip IPv6 happy-eyeballs and fail a blackholed mirror IP over to the
          # next resolved address instead of burning --max-time on a dead IP.
          curl -sf -4 --connect-timeout 5 --max-time 20 https://archive.ubuntu.com > /dev/null
          echo "Connected to archive.ubuntu.com (.ubuntu.com stripped -> matched 'archive' rule)"

      - name: Test bypass for an unmatched name under a search domain (forwarded, not refused)
        run: |
          # A made-up label under the .ubuntu.com search domain has no host rule, so
          # the proxy must BYPASS query filtering and forward it upstream rather than
          # refuse it as DNS tunneling. A non-existent label is used deliberately: it
          # has no CNAME chain to escape the suffix, so bypass -> upstream NXDOMAIN,
          # whereas a refusal (REFUSED) would mean bypass did not apply.
          OUTPUT=$(nslookup nonexistent-cargowall-bypass-test.ubuntu.com 127.0.0.1 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "REFUSED"; then
            echo "ERROR: a name under the search domain should be bypassed (forwarded), not REFUSED"
            exit 1
          fi
          echo "Correctly bypassed DNS query for a name under the search domain"

      - name: Test name outside any search domain is still refused (DNS tunneling guard)
        run: |
          # No host rule and not under a search domain -> the proxy refuses it.
          # `.example` is a reserved TLD, so this can never resolve for real.
          OUTPUT=$(nslookup blocked-cargowall-test.example 127.0.0.1 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "REFUSED"; then
            echo "Correctly refused DNS query for an off-suffix, unmatched name"
          else
            echo "ERROR: an off-suffix, unmatched name should be REFUSED"
            exit 1
          fi

  test-sudo-lockdown:
    name: Sudo Lockdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup CargoWall with sudo lockdown
        id: cargowall
        uses: ./
        with:
          allowed-hosts: |
            app.codecargo.com
            github.com
            archive.ubuntu.com
            security.ubuntu.com
          sudo-lockdown: true
          sudo-allow-commands: /usr/bin/apt-get
          # Make a false "exited unexpectedly" liveness verdict a hard failure.
          # Under lockdown the action can't probe liveness via sudo, so this
          # guards the tri-state 'unknown' path (must wait for the sentinel, not
          # crash) as well as the no-sudo pidfile read below.
          fail-on-unsupported: true

      - name: Verify real PID is tracked under sudo-lockdown
        run: |
          # The pidfile is 0644, so an unprivileged step reads it even under
          # lockdown; the action must report that same (real) PID, not the wrapper.
          OUT='${{ steps.cargowall.outputs.pid }}'
          FILE=$(cat /tmp/cargowall.pid)
          echo "output=$OUT file=$FILE"
          test -n "$OUT"
          test "$OUT" = "$FILE"
          ps -o comm= -p "$OUT" | tr -d '[:space:]' | grep -qx cargowall

      - name: Test apt-get works
        run: |
          sudo apt-get update || echo "apt update completed (may have partial failures due to network restrictions)"

      - name: Test iptables is blocked
        run: |
          if sudo iptables -L 2>/dev/null; then
            echo "WARNING: iptables access may not be fully blocked"
          else
            echo "Correctly blocked iptables"
          fi

  test-stale-startup-files:
    name: Stale Startup Files (reused runner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Plant stale ready/pid files (simulate a prior run on a reused runner)
        run: |
          # Root-owned, like the files cargowall leaves behind. Without the
          # action clearing them, the stale ready sentinel would short-circuit the
          # wait and the stale dead PID would trip a false "exited" verdict.
          echo 999999 | sudo tee /tmp/cargowall.pid > /dev/null
          sudo touch /tmp/cargowall-ready
          ls -l /tmp/cargowall.pid /tmp/cargowall-ready

      - name: Setup CargoWall
        id: cargowall
        uses: ./
        with:
          offline: 'true'
          fail-on-unsupported: true
          allowed-hosts: |
            github.com
            api.github.com

      - name: Verify clean start despite stale files
        run: |
          test '${{ steps.cargowall.outputs.supported }}' = 'true'
          PID='${{ steps.cargowall.outputs.pid }}'
          echo "pid=$PID"
          test -n "$PID"
          # Must be the real cargowall PID, not the planted stale 999999.
          test "$PID" != "999999"
          ps -o comm= -p "$PID" | tr -d '[:space:]' | grep -qx cargowall

      - name: Test allowed connection (github.com)
        run: |
          curl -sf --max-time 10 https://github.com > /dev/null
          echo "Successfully connected to github.com"

      - name: Test blocked connection (example.com)
        run: |
          if curl -sf --max-time 5 https://example.com > /dev/null 2>&1; then
            echo "ERROR: example.com should be blocked"
            exit 1
          fi
          echo "Correctly blocked example.com"

  test-fail-on-unsupported-cleanup:
    name: Fail-on-unsupported restores DNS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a fake cargowall that records its PID then exits
        run: |
          # Stand-in binary: writes the pidfile cargowall would, then exits
          # without ever writing the ready sentinel. The action sees a real but
          # dead PID -> 'dead' liveness -> startup failure. With
          # fail-on-unsupported the action must throw AND restore resolv.conf
          # (which start() repointed at 127.0.0.1 before launching).
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'for a in "$@"; do case "$a" in --pidfile=*) echo "$$" > "${a#--pidfile=}";; esac; done' \
            'exit 0' > /tmp/fake-cargowall
          chmod +x /tmp/fake-cargowall

      - name: Capture DNS before
        run: cat /etc/resolv.conf

      - name: Setup CargoWall (expected to fail)
        id: cw
        continue-on-error: true
        uses: ./
        with:
          offline: 'true'
          binary-path: /tmp/fake-cargowall
          fail-on-unsupported: true
          allowed-hosts: github.com

      - name: Assert startup failed and DNS was restored
        run: |
          if [ '${{ steps.cw.outcome }}' != 'failure' ]; then
            echo "ERROR: expected the action to fail, got '${{ steps.cw.outcome }}'"
            exit 1
          fi
          echo "resolv.conf after:"; cat /etc/resolv.conf
          if grep -qF 'nameserver 127.0.0.1' /etc/resolv.conf; then
            echo "ERROR: /etc/resolv.conf still points at cargowall's proxy (DNS not restored)"
            exit 1
          fi
          # DNS must actually resolve again.
          getent hosts github.com
