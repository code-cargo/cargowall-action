name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
      ref:
        description: "Source ref to build from - commit SHA, branch, or tag (defaults to main)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || 'main' }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git diff --name-only -- dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit before releasing."
            git diff --stat -- dist/
            exit 1
          fi

      - name: Create draft pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET="${{ inputs.ref || 'main' }}"
          gh release create "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.tag }}" \
            --target "$TARGET" \
            --generate-notes \
            --prerelease \
            --draft
