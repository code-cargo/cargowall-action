name: Check dist

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-dist:
    name: Check dist/ is up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Fail if dist/ is out of date
        run: |
          if [ -n "$(git diff --name-only -- dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff --stat -- dist/
            exit 1
          fi
          echo "dist/ is up to date"

      - name: Debug job context
        run: |
          echo "check_run_id=${{ job.check_run_id }}"
          echo "--- env vars with job/check ---"
          env | grep -iE "check_run|job_id" || echo "none found"
          echo "--- _diag Worker log snippets ---"
          DIAG=$(find /home/runner/actions-runner -name "_diag" -type d 2>/dev/null | head -1)
          if [ -n "$DIAG" ]; then
            echo "diag dir: $DIAG"
            ls -la "$DIAG"/Worker_* 2>/dev/null
            echo "--- first 200 lines of latest Worker log ---"
            cat "$DIAG"/Worker_*.log | head -200
          fi